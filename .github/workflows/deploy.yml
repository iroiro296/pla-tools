name: Deploy to GitHub Pages

# main にpushする度に自動でビルド＆公開（手動実行も可）
on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN に Pages デプロイ権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

# デプロイは同時に1つだけ（古い実行はキャンセル）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # pla-*.js をインライン展開した単一HTMLを生成し、dist/index.html として配信する
      - run: node scripts/build-single.mjs
      - run: mkdir dist && cp legends-arceus-damage-calc.html dist/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
